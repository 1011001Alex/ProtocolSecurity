# Gitleaks configuration for Protocol Security
# Allows ignoring false positives while still detecting real secrets

[allowlist]
description = "Ignore test files and documentation"

# Ignore test files with fake secrets
paths = [
  '''tests/.*''',
  '''docs/.*''',
  '''examples/.*''',
  '''mocks/.*''',
  '''fixtures/.*''',
  '''test_.*''',
  '''.*_test\.ts$''',
  '''.*_test\.js$''',
  '''.*\.test\.ts$''',
  '''.*\.test\.js$''',
  '''.*\.spec\.ts$''',
  '''.*\.spec\.js$'''
]

# Ignore placeholder patterns
regexes = [
  '''ghp_[xXoOiI0-9]{32,}''',  # GitHub placeholder tokens
  '''Bearer eyJ[A-Za-z0-9-_]+\.eyJ[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+''',  # Fake JWT tokens
  '''sk_test_[A-Za-z0-9]+''',  # Stripe test keys
  '''sk_live_[A-Za-z0-9]+''',  # Stripe live keys (if in tests)
  '''password.*=.*['"]?(dev|test|example|changeme)['"]?''',  # Development passwords
  '''token.*=.*['"]?(dev|test|example|dummy)['"]?''',  # Development tokens
  '''api[_-]?key.*=.*['"]?(dev|test|example|dummy)['"]?''',  # Development API keys
  '''secret.*=.*['"]?(dev|test|example|dummy)['"]?''',  # Development secrets
  '''fa6d7790f532613e3419a98fea398997799d3afa''',  # Specific hash to ignore
  '''REDACTED''',  # Redacted secrets
  '''\*{3,}''',  # Masked secrets (*****)
  '''xxx+''',  # Placeholder (xxxxx)
  '''your[_-]?.*[_-]?here''',  # Placeholders like "your_key_here"
  '''change[_-]?this[_-]?password''',  # Placeholder passwords
  '''changeme''',  # Common placeholder
  '''example''',  # Example values
  '''placeholder''',  # Placeholder values
  '''dummy''',  # Dummy values
  '''mock''',  # Mock values
  '''fake''',  # Fake values
  '''sample''',  # Sample values
  '''demo''',  # Demo values
]

# Ignore commits with specific messages
commitMessages = [
  '''^test:''',
  '''^tests:''',
  '''^spec:''',
  '''^specs:''',
  '''mock''',
  '''fake''',
  '''dummy''',
  '''placeholder''',
  '''example''',
  '''demo''',
  '''sample'''
]

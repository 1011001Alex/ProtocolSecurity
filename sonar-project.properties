# ========================================
# SONARQUBE CONFIGURATION
# Protocol Security Project
# ========================================

# ----------------------------------------
# Project Identification
# ----------------------------------------
sonar.projectKey=protocol-security
sonar.projectName=Protocol Security
sonar.projectVersion=1.0.0
sonar.description=Продвинутая система контроля целостности кода и файлов с поддержкой Code Signing, FIM, SBOM, SLSA verification и Threat Detection

# ----------------------------------------
# Source Configuration
# ----------------------------------------
sonar.sources=src
sonar.sourceEncoding=UTF-8
sonar.sourceDirectories=src

# ----------------------------------------
# TypeScript Configuration
# ----------------------------------------
sonar.typescript.tsconfigPath=tsconfig.json
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# ----------------------------------------
# Test Configuration
# ----------------------------------------
sonar.tests=tests
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/coverage/**

# ----------------------------------------
# Coverage Configuration
# ----------------------------------------
sonar.coverage.jacoco.xmlReportPaths=coverage/junit.xml
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/tests/**,**/node_modules/**,**/dist/**,**/coverage/**,**/*.d.ts,**/index.ts

# ----------------------------------------
# Exclusions
# ----------------------------------------
# Файлы, исключенные из анализа
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.js,**/*.d.ts,**/tests/**,**/*.spec.ts,**/*.test.ts

# Файлы, исключенные из дубликации кода
sonar.cpd.exclusions=**/node_modules/**,**/dist/**,**/tests/**,**/*.test.ts,**/*.spec.ts

# ----------------------------------------
# Security Hotspots
# ----------------------------------------
sonar.security.hotspots.inheritedRules=true
sonar.security.sources=src
sonar.security.sinks=src/**/*.{ts,js}

# ----------------------------------------
# Quality Gate Configuration
# ----------------------------------------
# Минимальное покрытие кода тестами (%)
sonar.coverageThreshold=80

# Минимальный процент успешных тестов
sonar.tests.threshold=95

# Максимальный уровень дублирования кода (%)
sonar.cpd.threshold=3

# Максимальное количество blocker/critical issues
sonar.issues.blocker.threshold=0
sonar.issues.critical.threshold=0

# ----------------------------------------
# Security Rating
# ----------------------------------------
# Целевой рейтинг безопасности (A, B, C, D, E)
sonar.security.rating=A

# ----------------------------------------
# Maintainability
# ----------------------------------------
# Целевой рейтинг поддерживаемости
sonar.maintainability.rating=A

# Порог технического долга (в минутах)
sonar.techdebt.threshold=5

# ----------------------------------------
# Reliability
# ----------------------------------------
# Целевой рейтинг надежности
sonar.reliability.rating=A

# ----------------------------------------
# External Analyzers
# ----------------------------------------
# ESLint отчет (если используется)
sonar.eslint.reportPaths=eslint-report.json

# ----------------------------------------
# SCM Configuration
# ----------------------------------------
sonar.scm.provider=git
sonar.scm.forceReloadAll=false
sonar.scm.disabled=false

# ----------------------------------------
# Analysis Mode
# ----------------------------------------
sonar.analysis.mode=publish
sonar.incrementalAnalysis=true

# ----------------------------------------
# Logging
# ----------------------------------------
sonar.verbose=false
sonar.log.level=INFO
sonar.log.file.path=logs/sonar.log

# ----------------------------------------
# Performance
# ----------------------------------------
sonar.buildcache.enable=true
sonar.branch.longLivedBranches.regex=(main|master|release-.*)
sonar.pullrequest.cache.strategy=branch

# ----------------------------------------
# OWASP Top 10 Detection
# ----------------------------------------
# Включает правила для обнаружения OWASP Top 10 уязвимостей
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.test.ts

# ----------------------------------------
# CWE/SANS Top 25 Detection
# ----------------------------------------
# Автоматически включено через Security Edition rules

# ----------------------------------------
# Custom Rules
# ----------------------------------------
# Кастомные правила безопасности для проекта
sonar.issue.ignore.allfile=**/*.d.ts

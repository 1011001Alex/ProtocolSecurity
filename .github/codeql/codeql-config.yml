# ========================================
# CODEQL CONFIGURATION
# Protocol Security Project
# ========================================
# Документация: https://codeql.github.com/docs/codeql-cli/

name: "Protocol Security CodeQL Config"

# ----------------------------------------
# Query Suites
# ----------------------------------------
# Включаем стандартные наборы запросов для TypeScript
query-filters:
  # Безопасность - критические уязвимости
  - kind: problem
    tags contain: security
    tags contain: external/cwe

  # Точность - только высоконадежные результаты
  - kind: problem
    precision: high

# ----------------------------------------
# Query Suites Configuration
# ----------------------------------------
queries:
  # Стандартные security queries для TypeScript
  - uses: security-extended
  # Дополнительные security queries с более широким покрытием
  - uses: security-and-quality

# ----------------------------------------
# Paths Configuration
# ----------------------------------------
paths:
  # Включаем исходный код для анализа
  - src
  # Исключаем тесты из security анализа
  - '!tests'
  - '!**/*.test.ts'
  - '!**/*.spec.ts'

paths-ignore:
  # Исключаем зависимости
  - node_modules
  # Исключаем скомпилированный код
  - dist
  - build
  # Исключаем тесты
  - tests
  - '**/*.test.ts'
  - '**/*.spec.ts'
  # Исключаем генерируемые файлы
  - '**/*.d.ts'
  - coverage
  # Исключаем конфигурационные файлы
  - '*.config.js'
  - '*.config.ts'
  # Исключаем примеры
  - examples
  # Исключаем документацию
  - docs
  - '**/*.md'

# ----------------------------------------
# Threat Model Configuration
# ----------------------------------------
# Настройка для обнаружения конкретных типов уязвимостей

# OWASP Top 10 2021
# A01:2021 - Broken Access Control
# A02:2021 - Cryptographic Failures
# A03:2021 - Injection
# A04:2021 - Insecure Design
# A05:2021 - Security Misconfiguration
# A06:2021 - Vulnerable and Outdated Components
# A07:2021 - Identification and Authentication Failures
# A08:2021 - Software and Data Integrity Failures
# A09:2021 - Security Logging and Monitoring Failures
# A10:2021 - Server-Side Request Forgery

# ----------------------------------------
# CWE Coverage
# ----------------------------------------
# CodeQL автоматически обнаруживает следующие CWE:
# CWE-79: XSS (Cross-Site Scripting)
# CWE-89: SQL Injection
# CWE-78: OS Command Injection
# CWE-22: Path Traversal
# CWE-312: Cleartext Storage of Sensitive Information
# CWE-327: Use of a Broken or Risky Cryptographic Algorithm
# CWE-502: Deserialization of Untrusted Data
# CWE-798: Hardcoded Credentials
# CWE-918: SSRF (Server-Side Request Forgery)

# ----------------------------------------
# Pack Configuration
# ----------------------------------------
# Использование кастомных CodeQL packs (опционально)
# packs:
#   codeql/typescript-queries: "*"

# ----------------------------------------
# Query Parameters
# ----------------------------------------
# Настройка параметров для конкретных queries
query-filters:
  # Исключаем low-severity findings для CI/CD
  - kind: problem
    severity: error
  - kind: problem
    severity: warning

# ----------------------------------------
# Trap Caching
# ----------------------------------------
# Включаем кэширование для ускорения повторных запусков
trap-caching: true

# ----------------------------------------
# Database Configuration
# ----------------------------------------
# Настройка создания базы данных
db:
  # Тип базы данных для TypeScript
  language: typescript
  # Опции сборщика
  build-mode: automatic

# ----------------------------------------
# Security Queries Specific
# ----------------------------------------
# Приоритетные категории security queries
security-query-categories:
  - injection
  - xss
  - path-injection
  - command-injection
  - sql-injection
  - ssrf
  - hardcoded-credentials
  - insecure-randomness
  - weak-cryptography
  - unsafe-deserialization
  - prototype-pollution
  - regular-expression-dos

# ----------------------------------------
# Performance Optimization
# ----------------------------------------
# Оптимизация для больших проектов
performance:
  # Максимальное использование памяти (MB)
  max-memory: 4096
  # Количество потоков
  threads: 0  # 0 = auto-detect

# ----------------------------------------
# Output Configuration
# ----------------------------------------
# Формат вывода результатов
output:
  format: sarif-latest
  # Включаем исходный код в отчет
  include-source-code: true

# Pre-commit hooks for Protocol Security
# Install: pip install pre-commit && pre-commit install

repos:
  # Security scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks
        args: ['--config', '.gitleaks.toml']

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package.lock.json

  # TypeScript linting
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.55.0
    hooks:
      - id: eslint
        files: \.ts$
        args: ['--fix']
        additional_dependencies:
          - eslint@8.55.0
          - '@typescript-eslint/parser@6.13.1'
          - '@typescript-eslint/eslint-plugin@6.13.1'

  # TypeScript compilation check
  - repo: local
    hooks:
      - id: tsc
        name: TypeScript Compiler
        entry: npx tsc --noEmit
        language: system
        types: [typescript]
        pass_filenames: false

  # Test runner
  - repo: local
    hooks:
      - id: jest
        name: Jest Tests
        entry: npm test -- --findRelatedTests
        language: system
        types: [typescript]
        pass_filenames: true

  # Security audit
  - repo: local
    hooks:
      - id: npm-audit
        name: NPM Security Audit
        entry: npm audit --audit-level=moderate
        language: system
        pass_filenames: false
        stages: [pre-push]

  # Dependency check
  - repo: local
    hooks:
      - id: npm-outdated
        name: Check Outdated Dependencies
        entry: npm outdated
        language: system
        pass_filenames: false
        stages: [manual]

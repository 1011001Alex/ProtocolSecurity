# ========================================
# GitHub Actions: CodeQL Analysis
# Protocol Security Project
# ========================================
# Автоматический security analysis с загрузкой результатов в GitHub Security tab
# Документация: https://docs.github.com/en/code-security/code-scanning

name: "CodeQL Security Analysis"

on:
  # Запуск при пуше в основные ветки
  push:
    branches:
      - main
      - master
      - 'release/**'
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/codeql/**'
      - '.github/workflows/codeql-analysis.yml'
  
  # Запуск при создании pull request
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
  
  # Запуск при создании security advisory
  security_advisory:
    types: [published]
  
  # Ручной запуск через GitHub UI
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Включить debug режим'
        required: false
        default: 'false'
  
  # Расписание - ежедневный анализ в 02:00 UTC
  schedule:
    - cron: '0 2 * * *'

# Отмена предыдущих запусков при новом комите
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  # Требуется для загрузки SARIF результатов
  security-events: write
  # Требуется для checkout репозитория
  contents: read
  # Требуется для PR комментариев
  actions: read
  pull-requests: write

jobs:
  # ========================================
  # Job: CodeQL Analysis
  # ========================================
  analyze:
    name: Analyze CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        language:
          - typescript
        # Доступные языки: javascript, typescript, python, go, java, etc.
    
    steps:
      # ----------------------------------------
      # Step 1: Checkout Repository
      # ----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true
      
      # ----------------------------------------
      # Step 2: Initialize CodeQL
      # ----------------------------------------
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Путь к конфигурационному файлу
          config-file: ./.github/codeql/codeql-config.yml
          # Включаем query suites
          queries: security-extended,security-and-quality
          # Debug режим (опционально)
          debug: ${{ github.event.inputs.debug_enabled == 'true' && true || false }}
      
      # ----------------------------------------
      # Step 3: Setup Node.js
      # ----------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      # ----------------------------------------
      # Step 4: Install Dependencies
      # ----------------------------------------
      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          echo "Dependencies installed successfully"
      
      # ----------------------------------------
      # Step 5: Build Project
      # ----------------------------------------
      - name: Build project
        run: |
          npm run build
          echo "Build completed successfully"
      
      # ----------------------------------------
      # Step 6: Autobuild (Alternative)
      # ----------------------------------------
      # Если autobuild включен, этот шаг автоматически выполнит сборку
      # - name: Perform CodeQL Autobuild
      #   uses: github/codeql-action/autobuild@v3
      
      # ----------------------------------------
      # Step 7: Run CodeQL Analysis
      # ----------------------------------------
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          # Категория для группировки результатов
          category: "/language:${{matrix.language}}"
          # Формат вывода
          output: sarif-results
          # Upload SARIF file
          upload: true
          # Upload SARIF file to GitHub Security tab
          sarif_file: sarif-results/${{ matrix.language }}.sarif
      
      # ----------------------------------------
      # Step 8: Upload SARIF as Artifact
      # ----------------------------------------
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: sarif-results/${{ matrix.language }}.sarif
          retention-days: 30
          if-no-files-found: warn
      
      # ----------------------------------------
      # Step 9: Download SARIF for Processing
      # ----------------------------------------
      - name: Download SARIF for processing
        uses: actions/download-artifact@v4
        if: always()
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: ./sarif-download
      
      # ----------------------------------------
      # Step 10: Process SARIF Results
      # ----------------------------------------
      - name: Process SARIF Results
        if: always()
        run: |
          echo "=== CodeQL Analysis Summary ==="
          echo "SARIF files location: ./sarif-download"
          
          # Подсчет количества уязвимостей по уровням
          if [ -f "./sarif-download/${{ matrix.language }}.sarif" ]; then
            echo "Analyzing SARIF file..."
            
            # Используем jq для парсинга SARIF
            if command -v jq &> /dev/null; then
              ERROR_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' ./sarif-download/${{ matrix.language }}.sarif)
              WARNING_COUNT=$(jq '[.runs[].results[] | select(.level == "warning")] | length' ./sarif-download/${{ matrix.language }}.sarif)
              NOTE_COUNT=$(jq '[.runs[].results[] | select(.level == "note")] | length' ./sarif-download/${{ matrix.language }}.sarif)
              
              echo "🔴 Errors: $ERROR_COUNT"
              echo "🟡 Warnings: $WARNING_COUNT"
              echo "🔵 Notes: $NOTE_COUNT"
            else
              echo "jq not installed, skipping detailed analysis"
            fi
          else
            echo "SARIF file not found"
          fi
      
      # ----------------------------------------
      # Step 11: Security Gate Check
      # ----------------------------------------
      - name: Security Gate Check
        if: always()
        run: |
          echo "=== Security Gate Check ==="
          
          # Проверка на критические уязвимости
          if [ -f "./sarif-download/${{ matrix.language }}.sarif" ]; then
            if command -v jq &> /dev/null; then
              CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' ./sarif-download/${{ matrix.language }}.sarif)
              
              if [ "$CRITICAL_COUNT" -gt 0 ]; then
                echo "❌ SECURITY GATE FAILED: $CRITICAL_CRITICAL critical vulnerabilities found"
                echo "Please fix all critical security issues before merging."
                exit 1
              else
                echo "✅ SECURITY GATE PASSED: No critical vulnerabilities found"
              fi
            fi
          fi

  # ========================================
  # Job: Notify Results
  # ========================================
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: analyze
    if: always()
    
    steps:
      - name: Check Analysis Status
        run: |
          if [ "${{ needs.analyze.result }}" == "failure" ]; then
            echo "❌ CodeQL Analysis FAILED"
            echo "Please review the security findings in the Security tab."
          elif [ "${{ needs.analyze.result }}" == "success" ]; then
            echo "✅ CodeQL Analysis PASSED"
          else
            echo "⚠️ CodeQL Analysis status: ${{ needs.analyze.result }}"
          fi

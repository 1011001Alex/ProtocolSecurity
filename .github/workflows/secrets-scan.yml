# =============================================================================
# GITHUB ACTIONS WORKFLOW - SECRETS SCANNING
# =============================================================================
# Автоматическое сканирование на секреты при push и pull request
# Блокировка коммитов с секретами, отправка алертов в Slack
# =============================================================================
#
# Triggers: push, pull_request
# Scanners: GitLeaks, TruffleHog
# Reports: JSON, SARIF
# Notifications: Slack, GitHub Issues
#
# =============================================================================

name: 🔒 Secrets Scanning

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'release/**'
      - 'feature/**'
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'docs/**'
      - '.github/**'
    tags:
      - 'v*'

  pull_request:
    branches:
      - main
      - master
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  # Запуск по расписанию (ежедневно в 00:00 UTC)
  schedule:
    - cron: '0 0 * * *'

  # Ручной запуск
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Тип сканирования'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - staged
          - history
          - filesystem
      verbose:
        description: 'Подробный вывод'
        required: false
        default: 'false'
        type: boolean

# =============================================================================
# ENVIRONMENT VARIABLES
# =============================================================================
env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  GO_VERSION: '1.21'
  GITLEAKS_VERSION: '8.18.1'
  TRUFFLEHOG_VERSION: '3.63.0'
  REPORTS_DIR: './reports/secrets'
  SLACK_CHANNEL: '#security-alerts'

# =============================================================================
# CONCURRENCY SETTINGS
# =============================================================================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
# JOBS
# =============================================================================
jobs:
  # ===========================================================================
  # JOB: GITLEAKS SCAN
  # ===========================================================================
  gitleaks-scan:
    name: GitLeaks Secrets Detection
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      actions: read

    outputs:
      findings_count: ${{ steps.gitleaks.outputs.findings_count }}
      has_secrets: ${{ steps.gitleaks.outputs.has_secrets }}
      report_path: ${{ steps.gitleaks.outputs.report_path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install GitLeaks
        id: install_gitleaks
        run: |
          echo "Installing GitLeaks v${{ env.GITLEAKS_VERSION }}..."
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz
          tar -xzf gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
          echo "gitleaks_version=$(gitleaks version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Create reports directory
        run: mkdir -p ${{ env.REPORTS_DIR }}

      - name: Run GitLeaks (PR mode)
        id: gitleaks_pr
        if: github.event_name == 'pull_request'
        run: |
          echo "Running GitLeaks for PR #${{ github.event.pull_request.number }}..."
          echo "Comparing: ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
          
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format json \
            --report-path ${{ env.REPORTS_DIR }}/gitleaks-pr.json \
            --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --verbose || true

      - name: Run GitLeaks (Push mode)
        id: gitleaks_push
        if: github.event_name == 'push'
        run: |
          echo "Running GitLeaks for push to ${{ github.ref_name }}..."
          
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format json \
            --report-path ${{ env.REPORTS_DIR }}/gitleaks-push.json \
            --verbose || true

      - name: Run GitLeaks (Full history)
        id: gitleaks_full
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.scan_type == 'full')
        run: |
          echo "Running GitLeaks full history scan..."
          
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format json \
            --report-path ${{ env.REPORTS_DIR }}/gitleaks-full.json \
            --verbose || true

      - name: Run GitLeaks (Staged)
        id: gitleaks_staged
        if: github.event_name == 'workflow_dispatch' && inputs.scan_type == 'staged'
        run: |
          echo "Running GitLeaks staged scan..."
          
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --staged \
            --report-format json \
            --report-path ${{ env.REPORTS_DIR }}/gitleaks-staged.json \
            --verbose || true

      - name: Generate SARIF report
        id: generate_sarif
        run: |
          echo "Converting to SARIF format..."
          
          # Создаём SARIF из JSON отчёта
          cat > ${{ env.REPORTS_DIR }}/gitleaks.sarif << 'SARIF_TEMPLATE'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "GitLeaks",
                    "version": "${{ steps.install_gitleaks.outputs.gitleaks_version }}",
                    "informationUri": "https://github.com/gitleaks/gitleaks",
                    "rules": [
                      {
                        "id": "secrets",
                        "name": "Secrets Detection",
                        "shortDescription": {
                          "text": "Detects hardcoded secrets in source code"
                        },
                        "helpUri": "https://github.com/gitleaks/gitleaks",
                        "properties": {
                          "category": "security",
                          "security-severity": "9.0"
                        }
                      }
                    ]
                  }
                },
                "results": []
              }
            ]
          }
          SARIF_TEMPLATE
          
          echo "SARIF report created"

      - name: Upload SARIF to GitHub Security
        id: upload_sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ env.REPORTS_DIR }}/gitleaks.sarif
          category: gitleaks
          checkout_path: ${{ github.workspace }}

      - name: Analyze results
        id: gitleaks
        run: |
          echo "Analyzing GitLeaks results..."
          
          # Поиск последнего отчёта
          LATEST_REPORT=$(ls -t ${{ env.REPORTS_DIR }}/gitleaks-*.json 2>/dev/null | head -1)
          
          if [ -z "$LATEST_REPORT" ]; then
            echo "No reports found"
            echo "findings_count=0" >> $GITHUB_OUTPUT
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Latest report: $LATEST_REPORT"
          
          # Подсчёт находок
          FINDINGS=$(jq '.Report | length' "$LATEST_REPORT" 2>/dev/null || echo "0")
          
          echo "findings_count=$FINDINGS" >> $GITHUB_OUTPUT
          echo "report_path=$LATEST_REPORT" >> $GITHUB_OUTPUT
          
          if [ "$FINDINGS" -gt 0 ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
            echo "::error::GitLeaks обнаружил $FINDINGS секретов!"
            
            # Вывод деталей
            echo "=== DETECTED SECRETS ==="
            jq -r '.Report[] | "• \(.RuleID) in \(.File):\(.StartLine)"' "$LATEST_REPORT"
            echo "========================"
            
            exit 1
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "::notice::GitLeaks не обнаружил секретов"
            exit 0
          fi

      - name: Upload JSON report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report-${{ github.run_id }}
          path: ${{ env.REPORTS_DIR }}/gitleaks-*.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-html-report-${{ github.run_id }}
          path: ${{ env.REPORTS_DIR }}/*.html
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================================================
  # JOB: TRUFFLEHOG SCAN
  # ===========================================================================
  trufflehog-scan:
    name: TruffleHog Deep Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    outputs:
      findings_count: ${{ steps.trufflehog.outputs.findings_count }}
      has_secrets: ${{ steps.trufflehog.outputs.has_secrets }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install TruffleHog
        id: install_trufflehog
        run: |
          echo "Installing TruffleHog v${{ env.TRUFFLEHOG_VERSION }}..."
          go install github.com/trufflesecurity/trufflehog/v3@v${{ env.TRUFFLEHOG_VERSION }}
          
          # Добавление в PATH
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          
          trufflehog --version
          echo "trufflehog_version=$(trufflehog --version | cut -d' ' -f3)" >> $GITHUB_OUTPUT

      - name: Create reports directory
        run: mkdir -p ${{ env.REPORTS_DIR }}

      - name: Run TruffleHog (Git history)
        id: trufflehog_git
        run: |
          echo "Running TruffleHog git scan..."
          
          trufflehog git file://. \
            --json \
            --fail \
            --no-update \
            2>&1 | tee ${{ env.REPORTS_DIR }}/trufflehog-git.json || true

      - name: Run TruffleHog (Filesystem)
        id: trufflehog_fs
        run: |
          echo "Running TruffleHog filesystem scan..."
          
          trufflehog filesystem . \
            --exclude-dirs=node_modules,dist,build,coverage,vendor,.git \
            --json \
            --fail \
            --no-update \
            2>&1 | tee ${{ env.REPORTS_DIR }}/trufflehog-fs.json || true

      - name: Analyze results
        id: trufflehog
        run: |
          echo "Analyzing TruffleHog results..."
          
          # Объединение отчётов
          cat ${{ env.REPORTS_DIR }}/trufflehog-*.json 2>/dev/null | jq -s '.' > ${{ env.REPORTS_DIR }}/trufflehog-combined.json || echo "[]" > ${{ env.REPORTS_DIR }}/trufflehog-combined.json
          
          # Подсчёт находок
          FINDINGS=$(jq 'length' ${{ env.REPORTS_DIR }}/trufflehog-combined.json 2>/dev/null || echo "0")
          
          echo "findings_count=$FINDINGS" >> $GITHUB_OUTPUT
          
          if [ "$FINDINGS" -gt 0 ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
            echo "::error::TruffleHog обнаружил $FINDINGS секретов!"
            
            # Вывод деталей
            echo "=== DETECTED SECRETS ==="
            jq -r '.[] | "• \(.DetectorType) in \(.SourceMetadata.Data.Git.file // .SourceMetadata.Data.Filesystem.path)"' ${{ env.REPORTS_DIR }}/trufflehog-combined.json 2>/dev/null || true
            echo "========================"
            
            exit 1
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "::notice::TruffleHog не обнаружил секретов"
            exit 0
          fi

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trufflehog-report-${{ github.run_id }}
          path: ${{ env.REPORTS_DIR }}/trufflehog-*.json
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================================================
  # JOB: COMBINED ANALYSIS
  # ===========================================================================
  combined-analysis:
    name: Combined Security Analysis
    runs-on: ubuntu-latest
    needs: [gitleaks-scan, trufflehog-scan]
    if: always()

    outputs:
      total_findings: ${{ steps.analyze.outputs.total_findings }}
      should_block: ${{ steps.analyze.outputs.should_block }}

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          pattern: '*-report-*'
          path: ${{ env.REPORTS_DIR }}
          merge-multiple: true

      - name: Combined analysis
        id: analyze
        run: |
          echo "Combined Security Analysis"
          echo "=========================="
          
          GITLEAKS_FINDINGS=${{ needs.gitleaks-scan.outputs.findings_count }}
          TRUFFLEHOG_FINDINGS=${{ needs.trufflehog-scan.outputs.findings_count }}
          
          TOTAL=$((GITLEAKS_FINDINGS + TRUFFLEHOG_FINDINGS))
          
          echo "GitLeaks findings:      $GITLEAKS_FINDINGS"
          echo "TruffleHog findings:    $TRUFFLEHOG_FINDINGS"
          echo "Total findings:         $TOTAL"
          
          echo "total_findings=$TOTAL" >> $GITHUB_OUTPUT
          
          if [ "$TOTAL" -gt 0 ]; then
            echo "should_block=true" >> $GITHUB_OUTPUT
          else
            echo "should_block=false" >> $GITHUB_OUTPUT
          fi

      - name: Create summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🔒 Secrets Scanning Summary
          
          ## Results
          
          | Scanner | Findings | Status |
          |---------|----------|--------|
          | GitLeaks | ${{ needs.gitleaks-scan.outputs.findings_count }} | ${{ needs.gitleaks-scan.outputs.has_secrets == 'true' && '❌ Failed' || '✅ Passed' }} |
          | TruffleHog | ${{ needs.trufflehog-scan.outputs.findings_count }} | ${{ needs.trufflehog-scan.outputs.has_secrets == 'true' && '❌ Failed' || '✅ Passed' }} |
          
          ## Total Findings: ${{ steps.analyze.outputs.total_findings }}
          
          ## Status: ${{ steps.analyze.outputs.should_block == 'true' && '❌ SECRETS DETECTED' || '✅ NO SECRETS FOUND' }}
          
          ## Details
          
          - Workflow run: ${{ github.run_id }}
          - Repository: ${{ github.repository }}
          - Branch: ${{ github.ref_name }}
          - Commit: ${{ github.sha }}
          EOF

  # ===========================================================================
  # JOB: SLACK NOTIFICATION
  # ===========================================================================
  slack-notification:
    name: Send Slack Alert
    runs-on: ubuntu-latest
    needs: [combined-analysis]
    if: always() && (github.event_name == 'push' || github.event_name == 'schedule')
    
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          payload: |
            {
              "text": "🔒 Secrets Scanning Alert",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🔒 Secrets Scanning Alert",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n${{ github.workflow }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Findings:*\n${{ needs.combined-analysis.outputs.total_findings }} secrets detected"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Status:*\n${{ needs.combined-analysis.outputs.should_block == 'true' && '❌ FAILED - Secrets detected!' || '✅ PASSED - No secrets found' }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow",
                        "emoji": true
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ],
              "attachments": [
                {
                  "color": "${{ needs.combined-analysis.outputs.should_block == 'true' && 'danger' || 'good' }}"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ env.SLACK_CHANNEL }}

      - name: Create GitHub Issue (if secrets found)
        uses: actions/github-script@v7
        if: needs.combined-analysis.outputs.should_block == 'true' && github.event_name == 'push'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const findings = '${{ needs.combined-analysis.outputs.total_findings }}';
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 [SECURITY] Secrets detected in ${context.ref}`,
              body: `
            ## Security Alert: Secrets Detected
            
            **Findings:** ${findings} secrets detected
            
            **Repository:** ${context.repo.owner}/${context.repo.repo}
            **Branch:** ${context.ref}
            **Commit:** ${context.sha}
            **Workflow:** [${{ github.workflow }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ### Immediate Actions Required:
            
            1. Review the secrets scanning report
            2. Remove the exposed secrets from the codebase
            3. Rotate the compromised credentials immediately
            4. Update secrets in secure storage (Vault, AWS Secrets Manager, etc.)
            
            ### Scanners:
            
            - GitLeaks: ${{ needs.gitleaks-scan.outputs.findings_count }} findings
            - TruffleHog: ${{ needs.trufflehog-scan.outputs.findings_count }} findings
            
            ---
            *This issue was automatically created by the Secrets Scanning workflow*
            `,
              labels: ['security', 'critical', 'secrets']
            });

  # ===========================================================================
  # JOB: BLOCK IF SECRETS FOUND
  # ===========================================================================
  block-if-secrets:
    name: Block on Secrets Detection
    runs-on: ubuntu-latest
    needs: [combined-analysis]
    if: needs.combined-analysis.outputs.should_block == 'true'

    steps:
      - name: Block workflow
        run: |
          echo "::error::SECRETS DETECTED - Workflow blocked"
          echo "::error::Total findings: ${{ needs.combined-analysis.outputs.total_findings }}"
          echo ""
          echo "Please review the security scan results and remove all secrets before proceeding."
          echo ""
          echo "See SECRETS_SCANNING.md for instructions on how to handle detected secrets."
          exit 1

# =============================================================================
# END OF WORKFLOW
# =============================================================================

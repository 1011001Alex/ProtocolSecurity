# =============================================================================
# GITLEAKS CONFIGURATION FOR PROTOCOL SECURITY
# =============================================================================
# Полная конфигурация для обнаружения секретов и чувствительных данных
# Основано на лучших практиках OWASP и CWE
# =============================================================================

title = "Protocol Security Secrets Detection"

# =============================================================================
# ГЛОБАЛЬНЫЕ НАСТРОЙКИ
# =============================================================================
[extend]
# Расширяем базовую конфигурацию gitleaks
useDefault = true

[allowlist]
# Глобальные исключения
description = "Global Allowlist"
paths = [
    '''^tests/.*''',
    '''^test/.*''',
    '''^__tests__/.*''',
    '''^\.test\..*''',
    '''^\.spec\..*''',
    '''^node_modules/.*''',
    '''^dist/.*''',
    '''^build/.*''',
    '''^coverage/.*''',
    '''^\.git/.*''',
    '''^vendor/.*''',
    '''^third_party/.*''',
    '''^examples/.*test.*''',
    '''^mocks/.*''',
    '''^fixtures/.*''',
]
regexes = [
    '''(?i)^test.*''',
    '''(?i).*example.*''',
    '''(?i).*sample.*''',
    '''(?i).*fake.*''',
    '''(?i).*dummy.*''',
]

# =============================================================================
# API KEYS DETECTION
# =============================================================================
[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(?:api[_-]?key|apikey|api_secret|apisecret)["\s:=]+["'][a-zA-Z0-9_\-]{16,}["']'''
keywords = [
    "api_key",
    "apikey",
    "api-key",
    "api_secret",
    "apisecret",
]
entropy = 3.5
severity = "HIGH"

[[rules]]
id = "google-api-key"
description = "Google API Key"
regex = '''AIza[0-9A-Za-z\-_]{35}'''
keywords = [
    "AIza",
]
severity = "CRITICAL"

[[rules]]
id = "google-oauth"
description = "Google OAuth Client Secret"
regex = '''[0-9]+-[0-9A-Za-z_]{32}\.apps\.googleusercontent\.com'''
keywords = [
    "apps.googleusercontent.com",
]
severity = "CRITICAL"

[[rules]]
id = "stripe-api-key"
description = "Stripe API Key"
regex = '''(?:sk|pk|rk)_(?:test|live|prod)_[0-9a-zA-Z]{24,}'''
keywords = [
    "sk_test",
    "sk_live",
    "pk_test",
    "pk_live",
]
severity = "CRITICAL"

[[rules]]
id = "stripe-restricted-key"
description = "Stripe Restricted API Key"
regex = '''rk_(?:test|live)_[0-9a-zA-Z]{24,}'''
keywords = [
    "rk_test",
    "rk_live",
]
severity = "HIGH"

[[rules]]
id = "square-access-token"
description = "Square Access Token"
regex = '''(?:EAAA|sq0atp-)[0-9A-Za-z\-_]{22,}'''
keywords = [
    "EAAA",
    "sq0atp",
]
severity = "HIGH"

[[rules]]
id = "paypal-braintree-access-token"
description = "PayPal/Braintree Access Token"
regex = '''access_token\$production\$[0-9a-z]{16}\$[0-9a-f]{32}'''
keywords = [
    "access_token$production",
]
severity = "CRITICAL"

[[rules]]
id = "twilio-api-key"
description = "Twilio API Key"
regex = '''SK[0-9a-fA-F]{32}'''
keywords = [
    "twilio",
]
severity = "HIGH"

[[rules]]
id = "sendgrid-api-key"
description = "SendGrid API Key"
regex = '''SG\.[a-zA-Z0-9]{22}\.[a-zA-Z0-9]{43}'''
keywords = [
    "SG.",
]
severity = "CRITICAL"

[[rules]]
id = "mailgun-api-key"
description = "Mailgun API Key"
regex = '''key-[0-9a-zA-Z]{32}'''
keywords = [
    "mailgun",
]
severity = "HIGH"

[[rules]]
id = "telegram-bot-token"
description = "Telegram Bot Token"
regex = '''[0-9]+:[A-Za-z0-9_\-]{35}'''
keywords = [
    "telegram",
    "bot",
]
severity = "HIGH"

# =============================================================================
# AWS CREDENTIALS
# =============================================================================
[[rules]]
id = "aws-access-key-id"
description = "AWS Access Key ID"
regex = '''(?:A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
keywords = [
    "AKIA",
    "AGPA",
    "AIDA",
    "AROA",
    "AIPA",
    "ANPA",
    "ANVA",
    "ASIA",
]
severity = "CRITICAL"

[[rules]]
id = "aws-secret-access-key"
description = "AWS Secret Access Key"
regex = '''(?i)aws[_\-]?secret[_\-]?access[_\-]?key["\s:=]+["'][A-Za-z0-9/+=]{40}["']'''
keywords = [
    "aws_secret",
    "aws-secret",
    "awssecret",
]
entropy = 4.0
severity = "CRITICAL"

[[rules]]
id = "aws-secret-key-inline"
description = "AWS Secret Key (Inline)"
regex = '''(?i)(?:aws_secret_access_key|aws_secret_key|aws_secret)\s*=\s*["']?[A-Za-z0-9/+=]{40}["']?'''
keywords = [
    "aws_secret_access_key",
    "aws_secret_key",
]
severity = "CRITICAL"

[[rules]]
id = "aws-account-id"
description = "AWS Account ID"
regex = '''(?:aws[_\-]?account[_\-]?id|AWS_ACCOUNT_ID)["\s:=]+["']?[0-9]{12}["']?'''
keywords = [
    "aws_account",
    "aws-account",
]
severity = "MEDIUM"

[[rules]]
id = "aws-session-token"
description = "AWS Session Token"
regex = '''(?i)(?:aws[_\-]?session[_\-]?token|AWS_SESSION_TOKEN)["\s:=]+["'][A-Za-z0-9/+=]{16,}["']'''
keywords = [
    "aws_session_token",
    "aws-session-token",
]
severity = "HIGH"

# =============================================================================
# PRIVATE KEYS & CERTIFICATES
# =============================================================================
[[rules]]
id = "private-key"
description = "Private Key (Generic)"
regex = '''-----BEGIN (?:RSA |EC |DSA |OPENSSH |ENCRYPTED )?PRIVATE KEY-----'''
keywords = [
    "PRIVATE KEY",
]
severity = "CRITICAL"

[[rules]]
id = "rsa-private-key"
description = "RSA Private Key"
regex = '''-----BEGIN RSA PRIVATE KEY-----'''
keywords = [
    "RSA PRIVATE KEY",
]
severity = "CRITICAL"

[[rules]]
id = "ec-private-key"
description = "EC Private Key"
regex = '''-----BEGIN EC PRIVATE KEY-----'''
keywords = [
    "EC PRIVATE KEY",
]
severity = "CRITICAL"

[[rules]]
id = "openssh-private-key"
description = "OpenSSH Private Key"
regex = '''-----BEGIN OPENSSH PRIVATE KEY-----'''
keywords = [
    "OPENSSH PRIVATE KEY",
]
severity = "CRITICAL"

[[rules]]
id = "pgp-private-key"
description = "PGP Private Key"
regex = '''-----BEGIN PGP PRIVATE KEY BLOCK-----'''
keywords = [
    "PGP PRIVATE KEY",
]
severity = "CRITICAL"

[[rules]]
id = "encrypted-private-key"
description = "Encrypted Private Key"
regex = '''-----BEGIN ENCRYPTED PRIVATE KEY-----'''
keywords = [
    "ENCRYPTED PRIVATE KEY",
]
severity = "HIGH"

[[rules]]
id = "ssh-rsa-private"
description = "SSH RSA Private Key File Content"
regex = '''(?i)ssh-rsa\s+[A-Za-z0-9+/]+[=]{0,3}'''
keywords = [
    "ssh-rsa",
]
severity = "HIGH"

[[rules]]
id = "certificate"
description = "Certificate (Potential Secret)"
regex = '''-----BEGIN CERTIFICATE-----'''
keywords = [
    "CERTIFICATE",
]
severity = "MEDIUM"

[[rules]]
id = "pkcs12-pfx"
description = "PKCS12/PFX File Reference"
regex = '''(?i)(?:\.p12|\.pfx|\.p12\?|\.pfx\?)'''
keywords = [
    ".p12",
    ".pfx",
]
severity = "HIGH"

# =============================================================================
# PASSWORDS & SECRETS
# =============================================================================
[[rules]]
id = "generic-password"
description = "Generic Password"
regex = '''(?i)(?:password|passwd|pwd|pass|secret)["\s:=]+["'][^"'\s]{8,}["']'''
keywords = [
    "password",
    "passwd",
    "pwd",
    "secret",
]
entropy = 3.0
severity = "HIGH"

[[rules]]
id = "password-in-url"
description = "Password in URL"
regex = '''(?:https?|ftp|ftps)://[^:]+:[^@]+@'''
keywords = [
    "://",
]
severity = "HIGH"

[[rules]]
id = "basic-auth-header"
description = "Basic Auth Header"
regex = '''(?i)basic\s+[a-zA-Z0-9+/=]{20,}'''
keywords = [
    "basic",
]
severity = "HIGH"

[[rules]]
id = "bearer-token"
description = "Bearer Token"
regex = '''(?i)bearer\s+[a-zA-Z0-9_\-\.]+'''
keywords = [
    "bearer",
]
severity = "HIGH"

[[rules]]
id = "connection-string"
description = "Database Connection String"
regex = '''(?i)(?:mongodb|postgres|mysql|redis|amqp)://[^:]+:[^@]+@'''
keywords = [
    "mongodb://",
    "postgres://",
    "mysql://",
    "redis://",
    "amqp://",
]
severity = "CRITICAL"

[[rules]]
id = "heroku-api-key"
description = "Heroku API Key"
regex = '''(?i)heroku[a-z0-9_-]*[\s"']+[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'''
keywords = [
    "heroku",
]
severity = "HIGH"

[[rules]]
id = "slack-token"
description = "Slack Token"
regex = '''xox[baprs]-[0-9]{10,13}-[0-9]{10,13}[a-zA-Z0-9-]*'''
keywords = [
    "xoxb",
    "xoxa",
    "xoxp",
    "xoxr",
    "xoxs",
]
severity = "CRITICAL"

[[rules]]
id = "slack-webhook"
description = "Slack Webhook URL"
regex = '''https://hooks\.slack\.com/services/T[a-zA-Z0-9_]{8}/B[a-zA-Z0-9_]{8}/[a-zA-Z0-9_]{24}'''
keywords = [
    "hooks.slack.com",
]
severity = "HIGH"

[[rules]]
id = "github-token"
description = "GitHub Token"
regex = '''(?:ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9_]{36,}'''
keywords = [
    "ghp_",
    "gho_",
    "ghu_",
    "ghs_",
    "ghr_",
]
severity = "CRITICAL"

[[rules]]
id = "github-oauth"
description = "GitHub OAuth Token"
regex = '''github_pat_[A-Za-z0-9_]{22}_[A-Za-z0-9_]{59}'''
keywords = [
    "github_pat_",
]
severity = "CRITICAL"

[[rules]]
id = "github-app-token"
description = "GitHub App Token"
regex = '''(ghu|ghs)_[0-9a-zA-Z]{36}'''
keywords = [
    "ghu_",
    "ghs_",
]
severity = "CRITICAL"

[[rules]]
id = "gitlab-token"
description = "GitLab Token"
regex = '''glpat-[A-Za-z0-9\-_]{20,}'''
keywords = [
    "glpat-",
]
severity = "CRITICAL"

[[rules]]
id = "npm-token"
description = "NPM Token"
regex = '''//registry\.npmjs\.org/:_authToken=[A-Za-z0-9\-_]{36,}'''
keywords = [
    "npmjs.org",
    "_authToken",
]
severity = "HIGH"

[[rules]]
id = "docker-hub-token"
description = "Docker Hub Token"
regex = '''(?i)docker[_\-]?hub[_\-]?token["\s:=]+["'][a-zA-Z0-9_\-]{30,}["']'''
keywords = [
    "docker_hub_token",
    "dockerhub",
]
severity = "HIGH"

[[rules]]
id = "datadog-api-key"
description = "Datadog API Key"
regex = '''[a-f0-9]{32}'''
keywords = [
    "datadog",
]
severity = "HIGH"

[[rules]]
id = "new-relic-api-key"
description = "New Relic API Key"
regex = '''(?:NRAK|NRRA)[A-Z0-9]{27}'''
keywords = [
    "NRAK",
    "NRRA",
]
severity = "HIGH"

# =============================================================================
# JWT TOKENS
# =============================================================================
[[rules]]
id = "jwt-token"
description = "JWT Token"
regex = '''eyJ[a-zA-Z0-9_-]*\.eyJ[a-zA-Z0-9_-]*\.[a-zA-Z0-9_-]*'''
keywords = [
    "eyJ",
]
entropy = 4.0
severity = "HIGH"

[[rules]]
id = "jwt-header"
description = "JWT in Authorization Header"
regex = '''(?i)authorization["\s:=]+bearer\s+eyJ[a-zA-Z0-9_-]*\.eyJ[a-zA-Z0-9_-]*'''
keywords = [
    "authorization",
    "bearer",
]
severity = "CRITICAL"

[[rules]]
id = "jwt-secret"
description = "JWT Secret Key"
regex = '''(?i)(?:jwt[_\-]?secret|jwt[_\-]?key|json[_\-]?web[_\-]?token[_\-]?secret)["\s:=]+["'][^"']{16,}["']'''
keywords = [
    "jwt_secret",
    "jwt-secret",
    "jwtsecret",
]
severity = "CRITICAL"

# =============================================================================
# CLOUD PROVIDER SECRETS
# =============================================================================
[[rules]]
id = "gcp-service-account"
description = "GCP Service Account Key"
regex = '''"type":\s*"service_account"'''
keywords = [
    "service_account",
]
severity = "CRITICAL"

[[rules]]
id = "azure-connection-string"
description = "Azure Storage Connection String"
regex = '''DefaultEndpointsProtocol=https;AccountName=[^;]+;AccountKey=[A-Za-z0-9+/=]{88};EndpointSuffix=core\.windows\.net'''
keywords = [
    "AccountKey",
    "DefaultEndpointsProtocol",
]
severity = "CRITICAL"

[[rules]]
id = "azure-sas-token"
description = "Azure SAS Token"
regex = '''(?:sv=\d{4}-\d{2}-\d{2}&se=[^&]+&sr=[^&]+&sig=[A-Za-z0-9%]+)'''
keywords = [
    "sig=",
    "sv=",
]
severity = "HIGH"

[[rules]]
id = "digitalocean-token"
description = "DigitalOcean Token"
regex = '''v1\.[0-9a-f]{64}'''
keywords = [
    "digitalocean",
]
severity = "HIGH"

[[rules]]
id = "linode-token"
description = "Linode API Token"
regex = '''linode_token_[a-zA-Z0-9]{64}'''
keywords = [
    "linode_token_",
]
severity = "HIGH"

# =============================================================================
# DATABASE SECRETS
# =============================================================================
[[rules]]
id = "mysql-password"
description = "MySQL Password"
regex = '''(?i)(?:mysql[_\-]?password|mysql[_\-]?pwd)["\s:=]+["'][^"']{8,}["']'''
keywords = [
    "mysql_password",
    "mysql-password",
]
severity = "HIGH"

[[rules]]
id = "postgres-password"
description = "PostgreSQL Password"
regex = '''(?i)(?:postgres[_\-]?password|postgresql[_\-]?password|pg[_\-]?password)["\s:=]+["'][^"']{8,}["']'''
keywords = [
    "postgres_password",
    "postgresql_password",
]
severity = "HIGH"

[[rules]]
id = "redis-password"
description = "Redis Password"
regex = '''(?i)(?:redis[_\-]?password|redis[_\-]?auth)["\s:=]+["'][^"']{8,}["']'''
keywords = [
    "redis_password",
    "redis-password",
]
severity = "HIGH"

[[rules]]
id = "mongo-connection"
description = "MongoDB Connection String"
regex = '''mongodb(?:\+srv)?://[^:]+:[^@]+@[^/]+/[^?]+'''
keywords = [
    "mongodb://",
    "mongodb+srv://",
]
severity = "CRITICAL"

# =============================================================================
# MESSAGING & QUEUE SECRETS
# =============================================================================
[[rules]]
id = "rabbitmq-password"
description = "RabbitMQ Password"
regex = '''(?i)(?:rabbitmq[_\-]?password|amqp[_\-]?password)["\s:=]+["'][^"']{8,}["']'''
keywords = [
    "rabbitmq_password",
    "amqp_password",
]
severity = "HIGH"

[[rules]]
id = "kafka-password"
description = "Kafka Password"
regex = '''(?i)(?:kafka[_\-]?password|kafka[_\-]?secret)["\s:=]+["'][^"']{8,}["']'''
keywords = [
    "kafka_password",
    "kafka_secret",
]
severity = "HIGH"

# =============================================================================
# THIRD-PARTY SERVICE SECRETS
# =============================================================================
[[rules]]
id = "firebase-url"
description = "Firebase Database URL"
regex = '''[a-zA-Z0-9_-]+\.firebaseio\.com'''
keywords = [
    "firebaseio.com",
]
severity = "MEDIUM"

[[rules]]
id = "firebase-api-key"
description = "Firebase API Key"
regex = '''AIza[0-9A-Za-z\-_]{35}'''
keywords = [
    "firebase",
]
severity = "HIGH"

[[rules]]
id = "sentry-dsn"
description = "Sentry DSN"
regex = '''https://[a-f0-9]+@[a-f0-9]+\.ingest\.sentry\.io/[0-9]+'''
keywords = [
    "sentry.io",
]
severity = "MEDIUM"

[[rules]]
id = "appcenter-api-token"
description = "AppCenter API Token"
regex = '''[a-f0-9]{40}'''
keywords = [
    "appcenter",
]
severity = "HIGH"

[[rules]]
id = "circleci-token"
description = "CircleCI Token"
regex = '''[0-9a-f]{40}'''
keywords = [
    "circleci",
]
severity = "HIGH"

[[rules]]
id = "travisci-token"
description = "Travis CI Token"
regex = '''[a-zA-Z0-9]{22}'''
keywords = [
    "travis",
]
severity = "HIGH"

[[rules]]
id = "jenkins-api-token"
description = "Jenkins API Token"
regex = '''(?i)jenkins[_\-]?api[_\-]?token["\s:=]+["'][a-zA-Z0-9]{30,}["']'''
keywords = [
    "jenkins_api_token",
]
severity = "HIGH"

# =============================================================================
# ИСКЛЮЧЕНИЯ ДЛЯ ТЕСТОВЫХ ФАЙЛОВ
# =============================================================================
[[rules]]
id = "test-secret-placeholder"
description = "Test Secret Placeholder (Allowed)"
regex = '''(?i)(?:test[_\-]?secret|fake[_\-]?secret|dummy[_\-]?secret|example[_\-]?secret)["\s:=]+["'][^"']+["']'''
keywords = [
    "test_secret",
    "fake_secret",
    "dummy_secret",
    "example_secret",
]
allowlist = true
paths = [
    '''^tests/.*''',
    '''^test/.*''',
    '''^__tests__/.*''',
    '''^\.test\..*''',
    '''^\.spec\..*''',
    '''^examples/.*''',
    '''^mocks/.*''',
    '''^fixtures/.*''',
]

# =============================================================================
# НАСТРОЙКИ ОТЧЁТНОСТИ
# =============================================================================
[report]
# Формат отчёта по умолчанию
format = "json"

# Уровень детализации
verbosity = "verbose"

# Показывать строки с секретами
showLine = true

# =============================================================================
# КОНФИГУРАЦИЯ СКАНИРОВАНИЯ
# =============================================================================
[scan]
# Глубина сканирования истории git
maxDepth = 1000

# Сканировать закоммиченные секреты
scanHistory = true

# Сканировать staged изменения
scanStaged = true

# Игнорировать большие файлы (> 10MB)
maxFileSize = 10485760

# =============================================================================
# END OF CONFIGURATION
# =============================================================================
